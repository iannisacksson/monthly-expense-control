name: Backend Quality

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend-quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: monthly_expense_control_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d monthly_expense_control_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5433
      DB_NAME: monthly_expense_control_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      ACCESS_TOKEN_SECRET: test-access-secret
      ACCESS_TOKEN_TTL_MINUTES: 15
      REFRESH_TOKEN_TTL_DAYS: 30
      FRONTEND_ORIGIN: http://localhost:5173
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      TRUST_PROXY: false
      AUTH_LOGIN_RATE_LIMIT_MAX: 100
      AUTH_REFRESH_RATE_LIMIT_MAX: 100

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backend migrations for test database
        run: npm run test:db:migrate --workspace backend

      - name: Build backend
        run: npm run build --workspace backend

      - name: Run backend integration tests
        run: npm run test --workspace backend
services:
  postgres-test:
    image: postgres:16-alpine
    container_name: monthly-expense-control-postgres-test
    environment:
      POSTGRES_DB: monthly_expense_control_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d monthly_expense_control_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-test-data:/var/lib/postgresql/data

volumes:
  postgres-test-data: